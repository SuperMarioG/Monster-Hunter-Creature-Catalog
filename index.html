<!doctype html>
<html>
  <head>
    <title>Monster Hunter Creatures| Home</title>
    <meta name="description" content="A Catalog of Monsters in Monster Hunter" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Monster Hunter Creatures</h1>

</ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">HINT!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
      
    </div>
